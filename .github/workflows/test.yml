name: Build for testing

on:
  workflow_dispatch:
  push:
    branches:
    - "test"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: sudo apt-get install --assume-yes gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libgnutls28-dev uuid-dev

    - name: Download source code
      run: |
        git clone --branch test --depth 1 https://github.com/bschnei/ebu-bootloader.git
        cd ebu-bootloader
        git submodule sync
        git -c protocol.version=2 submodule update --init --force --depth=1

    - name: Build
      run: |
        cd ebu-bootloader
        make

    - name: Upload image
      uses: actions/upload-artifact@v4
      with:
        name: flash-image.bin
        path: trusted-firmware-a/build/a3700/release/flash-image.bin
